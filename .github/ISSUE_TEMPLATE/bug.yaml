name: Bug Report
description: Report a bug in a WANTED.solutions CAF building block or Terraform module.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us resolve the issue quickly.
  - type: dropdown
    id: cloud-provider
    attributes:
      label: Cloud Provider
      description: Which cloud provider are you using?
      options:
        - Microsoft Azure
        - Amazon Web Services (AWS)
        - Google Cloud Platform (GCP)
        - Not applicable
    validations:
      required: true
  - type: input
    id: module-version
    attributes:
      label: Module / Version
      description: Which module and version are you using?
      placeholder: "e.g. terraform-azure-kubernetes-service v1.2.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
      placeholder: "A clear and concise description of the bug."
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide minimal steps to reproduce the issue.
      placeholder: |
        1. Configure module with...
        2. Run `terraform plan`
        3. See error...
    validations:
      required: true
  - type: textarea
    id: terraform-config
    attributes:
      label: Terraform Configuration
      description: Paste the relevant Terraform configuration (remove sensitive data).
      render: hcl
    validations:
      required: false
  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste any relevant error messages or logs.
      render: shell
    validations:
      required: false
  - type: input
    id: terraform-version
    attributes:
      label: Terraform / OpenTofu Version
      placeholder: "e.g. Terraform 1.7.0 / OpenTofu 1.6.0"
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: Optional — how can we reach you if we need more info?
      placeholder: "email@example.com"
    validations:
      required: false
