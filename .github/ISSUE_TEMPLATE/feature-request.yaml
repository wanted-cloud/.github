name: Feature Request
description: Propose a new feature or enhancement to a WANTED.solutions CAF building block.
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your use case and proposed solution clearly.
  - type: dropdown
    id: cloud-provider
    attributes:
      label: Cloud Provider
      description: Which cloud provider does this feature relate to?
      options:
        - Microsoft Azure
        - Amazon Web Services (AWS)
        - Google Cloud Platform (GCP)
        - All / Provider-agnostic
    validations:
      required: true
  - type: input
    id: module
    attributes:
      label: Module / Component
      description: Which module or component should this feature be added to?
      placeholder: "e.g. terraform-azure-kubernetes-service, or 'new module'"
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem are you trying to solve? What is your use case?
      placeholder: "I'm trying to achieve X, but currently I have to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or enhancement you'd like to see.
      placeholder: "It would be great if..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any links, references, or additional context (e.g. CAF documentation, Azure docs).
    validations:
      required: false
