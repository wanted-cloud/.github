name: Documentation Improvement
description: Report a gap, error, or improvement needed in WANTED.solutions documentation.
title: "[Docs]: "
labels: ["documentation", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Help us improve our documentation! Please describe what you found and how it can be better.
  - type: input
    id: doc-location
    attributes:
      label: Documentation Location
      description: Link to the documentation page or file that needs improvement.
      placeholder: "e.g. https://github.com/wanted-cloud/.github/blob/main/docs/framework/azure/README.md"
    validations:
      required: true
  - type: dropdown
    id: issue-type
    attributes:
      label: Type of Issue
      options:
        - Incorrect information
        - Missing information
        - Outdated content
        - Unclear explanation
        - Typo / Grammar
        - Broken link
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What needs to be improved?
      description: Describe what is wrong or missing.
      placeholder: "The documentation says X, but it should say Y..."
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: If you have a suggestion for how to improve it, share it here.
    validations:
      required: false
